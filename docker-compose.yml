services:
  postgres:
    image: postgres:16
    container_name: smartims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_ims
      POSTGRES_USER: akshay_gouda
      POSTGRES_PASSWORD: Aky@8971
    volumes:
      - smartims-postgres-data:/var/lib/postgresql/data
    networks:
      - smartims-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akshay_gouda -d smart_ims"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: smartims-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/smart_ims
      DB_USERNAME: akshay_gouda
      DB_PASSWORD: Aky@8971
      JWT_SECRET: SmartIncidentManagementJwtSecretKeyMustBeAtLeast32CharactersLong2026
      JWT_EXPIRATION: 3600000
      FRONTEND_LOGIN_URL: http://54.84.79.139:8081/login
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartims-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://54.84.79.139:8081
    container_name: smartims-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - smartims-network

volumes:
  smartims-postgres-data:

networks:
  smartims-network:
    driver: bridge
